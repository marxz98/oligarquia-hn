<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OLIGARQUÍA HN — Radiografía del Poder en Honduras</title>
  <meta name="description" content="Investigación ciudadana: familias oligárquicas, empresas, vínculos políticos, medios de comunicación y crimen organizado en Honduras.">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- D3.js for network visualization -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Mobile menu toggle -->
  <button class="mob-tog" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

  <div id="app">
    <!-- ═══ SIDEBAR ═══ -->
    <nav class="sidebar" id="sidebar">
      <div class="sb-logo">
        <h1>OLIGARQUÍA<em>HN</em></h1>
        <p>RADIOGRAFÍA DEL PODER</p>
      </div>

      <div class="sb-nav">
        <div class="sb-section">
          <div class="sb-section-label">INVESTIGACIÓN</div>
          <div class="sb-item active" data-pg="dashboard"><span class="ic">◉</span><span class="lb">Dashboard</span></div>
          <div class="sb-item" data-pg="red"><span class="ic">◎</span><span class="lb">Red de Poder</span></div>
        </div>

        <div class="sb-section">
          <div class="sb-section-label">PERFILES</div>
          <div class="sb-item" data-pg="personas"><span class="ic">👤</span><span class="lb">Personas</span><span class="ct" id="c-p"></span></div>
          <div class="sb-item" data-pg="grupos"><span class="ic">👥</span><span class="lb">Grupos Familiares</span><span class="ct" id="c-g"></span></div>
          <div class="sb-item" data-pg="empresas"><span class="ic">🏢</span><span class="lb">Empresas</span><span class="ct" id="c-e"></span></div>
        </div>

        <div class="sb-section">
          <div class="sb-section-label">PODER E INFLUENCIA</div>
          <div class="sb-item" data-pg="partidos"><span class="ic">🏛</span><span class="lb">Partidos Políticos</span><span class="ct" id="c-pt"></span></div>
          <div class="sb-item" data-pg="medios"><span class="ic">📺</span><span class="lb">Medios</span><span class="ct" id="c-m"></span></div>
        </div>

        <div class="sb-section">
          <div class="sb-section-label">CRIMEN ORGANIZADO</div>
          <div class="sb-item" data-pg="carteles"><span class="ic">⚠</span><span class="lb">Carteles / Narco</span><span class="ct" id="c-c"></span></div>
        </div>
      </div>

      <div class="sb-ft">
        <button class="sb-btn" id="theme-toggle" onclick="toggleTheme()" style="display:flex;align-items:center;justify-content:center;gap:6px">🌙 Modo Oscuro</button>
        <button class="sb-btn" id="bl" onclick="showModal('login')">🔒 Iniciar Sesión</button>
        <button class="sb-btn admin-on hidden" id="blo" onclick="doLogout()">● Cerrar Sesión Admin</button>
      </div>
    </nav>

    <!-- ═══ MAIN AREA ═══ -->
    <div class="main-area">
      <div class="topbar">
        <div class="srch">
          <input id="search" placeholder="Buscar personas, empresas, grupos, medios..." oninput="doSearch()">
        </div>
        <div class="tst"><div class="tst-v" style="color:var(--red)" id="ts-p"></div><div class="tst-l">PERSONAS</div></div>
        <div class="tst"><div class="tst-v" style="color:var(--amb)" id="ts-e"></div><div class="tst-l">EMPRESAS</div></div>
        <div class="tst"><div class="tst-v" style="color:var(--pur)" id="ts-n"></div><div class="tst-l">NARCO</div></div>
        <div class="tst"><div class="tst-v" style="color:var(--red)" id="ts-a"></div><div class="tst-l">ALERTAS</div></div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <!-- ═══ MODAL ═══ -->
  <div class="mbg" id="modal"><div class="mdl" id="modal-body"></div></div>

  <!-- Tooltip for network graph -->
  <div class="net-tt" id="tooltip" style="display:none"></div>

  <!-- ═══ SCRIPTS (loaded in dependency order) ═══ -->
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/render/dashboard.js"></script>
  <script src="js/render/personas.js"></script>
  <script src="js/render/grupos.js"></script>
  <script src="js/render/empresas.js"></script>
  <script src="js/render/partidos.js"></script>
  <script src="js/render/medios.js"></script>
  <script src="js/render/carteles.js"></script>
  <script src="js/render/network.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
